    <script>
        // Scroll reveal animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-reveal').forEach(el => {
            observer.observe(el);
        });

        // Show thank you message on form submit
        function showThankYou(event) {
            event.preventDefault(); // מונע ריענון העמוד
            
            // שליחת הטופס ב-AJAX
            const form = event.target;
            const formData = new FormData(form);
            
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(() => {
                // הצגת הודעת תודה
                document.getElementById('success-message').style.display = 'block';
                document.querySelector('.contact-form').style.display = 'none';
                document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
            }).catch(() => {
                // גם אם יש שגיאה, נציג הודעה
                document.getElementById('success-message').style.display = 'block';
                document.querySelector('.contact-form').style.display = 'none';
                document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
            });
            
            return false;
        }

        // Toggle mobile menu
        function toggleMenu() {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        }

        // Close menu when clicking on a link
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navMenu').classList.remove('active');
            });
        });

        // עדכון active כשלוחצים על קישורים פנימיים (#contact)
        document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                
                // אם זה קישור פנימי (מתחיל ב-#)
                if (href && href.startsWith('#')) {
                    // הסר active מכל הקישורים בשני התפריטים
                    document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(l => {
                        l.classList.remove('active');
                    });
                    
                    // הוסף active לקישורים עם אותו href בשני התפריטים
                    document.querySelectorAll(`.nav-menu a[href="${href}"], .bottom-nav a[href="${href}"]`).forEach(l => {
                        l.classList.add('active');
                    });
                }
            });
        });

        // פונקציה עזר לעדכון active
        function setActive(href) {
            document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(l => {
                l.classList.remove('active');
            });
            document.querySelectorAll(`.nav-menu a[href="${href}"], .bottom-nav a[href="${href}"]`).forEach(l => {
                l.classList.add('active');
            });
        }

        // Scroll Spy - עמוד חנות
        // (אין scroll spy בדף זה)

        // כפתור חזרה למעלה
        const scrollTopBtn = document.createElement('button');
        scrollTopBtn.innerHTML = '↑';
        scrollTopBtn.className = 'scroll-top-btn';
        scrollTopBtn.setAttribute('aria-label', 'חזרה למעלה');
        document.body.appendChild(scrollTopBtn);

        // הצגת/הסתרת הכפתור
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        // לחיצה על הכפתור
        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActive('shop.html');
        });

        // כפתור עגלת קניות
        const cartBtn = document.createElement('button');
        cartBtn.innerHTML = '🛒<span class="badge" id="cartBadge">0</span>';
        cartBtn.className = 'cart-btn';
        cartBtn.setAttribute('aria-label', 'עגלת קניות');
        cartBtn.onclick = function() { window.location.href = 'cart.html'; };
        document.body.appendChild(cartBtn);

        // עדכון תג עגלה
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }
        updateCartBadge();

        // עדכון דינמי של margin-bottom של הפוטר לפי גובה התפריט
        function updateFooterAndButtons() {
            const bottomNav = document.querySelector('.bottom-nav');
            const footer = document.querySelector('footer');
            const scrollBtn = document.querySelector('.scroll-top-btn');
            const cartBtn = document.querySelector('.cart-btn');
            
            if (window.innerWidth <= 768 && bottomNav) {
                const navHeight = bottomNav.offsetHeight;
                
                // הפוטר תמיד מעל התפריט
                if (footer) footer.style.marginBottom = navHeight + 'px';
                
                // בדוק אם הפוטר קרוב לתחתית המסך
                let buttonBottom = navHeight + 20; // ברירת מחדל: רק מעל התפריט
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    const footerDistanceFromBottom = viewportHeight - footerRect.top;
                    
                    // אם הפוטר קרוב לתחתית (נמצא באזור התפריט)
                    if (footerDistanceFromBottom > 0 && footerDistanceFromBottom < viewportHeight) {
                        const footerHeight = footer.offsetHeight;
                        buttonBottom = navHeight + footerHeight + 20; // מעל הפוטר
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            } else {
                // מחשב - בדוק אם הפוטר נראה בתחתית
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30; // ברירת מחדל
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    // אם הפוטר נראה בתחתית המסך
                    if (footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20; // מעל הפוטר
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            }
        }

        // קריאה בטעינה, שינוי גודל, וגלילה
        updateFooterAndButtons();
        window.addEventListener('resize', updateFooterAndButtons);
        window.addEventListener('scroll', updateFooterAndButtons);

        // הזזת כפתור איזור אישי בגלילה - רק במובייל
        function updateAccountButtonPosition() {
            if (window.innerWidth <= 768) {
                const accountLink = document.querySelector('.account-link');
                if (accountLink) {
                    if (window.scrollY > 140) {
                        accountLink.style.top = '10px';
                    } else {
                        accountLink.style.top = '150px';
                    }
                               }
            }
        }

        window.addEventListener('scroll', updateAccountButtonPosition);
        window.addEventListener('resize', updateAccountButtonPosition);
        updateAccountButtonPosition();
    </script>

<script>

        const API_URL = 'https://ecodos-backend-production.up.railway.app';
        let allProducts = [];

        // Toast notification
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // טעינת מוצרים
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/api/products`);
                if (!response.ok) throw new Error('שגיאה בטעינת מוצרים');
                
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productsContainer').innerHTML = 
                    '<div class="error">בקרוב...</div>';
            }
        }

        // הצגת מוצרים
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length > 0 && allProducts.length === 0) {
                allProducts = products;
            }
            
            if (products.length === 0) {
                container.innerHTML = '<div class="error">בקרוב...</div>';
                return;
            }

            const categoryFilter = document.getElementById('categoryFilter');
            if (categoryFilter && products.length > 0) {
                categoryFilter.style.display = 'flex';
            }

            const cart = JSON.parse(localStorage.getItem('cart') || '[]');

            container.innerHTML = products.map(product => {
                const finalPrice = product.sale_price || product.price;
                const hasStock = product.stock_quantity > 0;
                const lowStock = product.stock_quantity > 0 && product.stock_quantity <= 10;
                const cartItem = cart.find(item => item.id === product.id);
                const inCart = cartItem ? cartItem.quantity : 0;
                
                return `
                <div class="product-card">
                    ${product.badge ? `<div class="product-badge">${product.badge}</div>` : ''}
                    
                    ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}" class="product-image">` : ''}
                    
                    <h3 class="product-name">${product.name}</h3>
                    
                    <div>
                        <div class="stock-status ${hasStock ? 'in-stock' : 'out-of-stock'}">
                            ${hasStock ? '🟢 במלאי' : '🔴 אזל מהמלאי'}
                        </div>
                        ${product.has_warranty ? '<span class="warranty-badge">🛡️ אחריות</span>' : ''}
                    </div>
                    
                    ${lowStock ? `<span class="stock-warning">⚠️ נשארו ${product.stock_quantity} יחידות בלבד!</span>` : ''}
                    
                    <p class="product-description">${product.short_description || product.description || ''}</p>
                    
                    <div style="flex-grow: 1;"></div>
                    
                    <div class="price-container">
                        ${product.price_label ? `<span class="price-label">${product.price_label}</span>` : ''}
                        <div class="price-wrapper">
                            ${product.sale_price ? 
                                `<span class="original-price">₪${product.price}</span>
                                 <span class="product-price sale-price">₪${product.sale_price}</span>` :
                                `<span class="product-price">₪${product.price}</span>`
                            }
                        </div>
                    </div>
                    
                    <button class="details-btn" onclick='openModal(${JSON.stringify(product).replace(/'/g, "&#39;")})'>
                        📋 פרטים נוספים
                    </button>
                    
                    <div id="cart-btn-${product.id}">
                        ${inCart > 0 ? 
                            `<div class="quantity-selector">
                                <button class="quantity-btn" onclick="updateQuantity(${product.id}, ${inCart - 1}, ${product.stock_quantity})">-</button>
                                <div class="quantity-display">${inCart}</div>
                                <button class="quantity-btn" onclick="updateQuantity(${product.id}, ${inCart + 1}, ${product.stock_quantity})">+</button>
                            </div>` :
                            `<button 
                                class="add-to-cart-btn" 
                                onclick="addToCart(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${finalPrice}, ${product.stock_quantity})"
                                ${!hasStock ? 'disabled' : ''}
                            >
                                ${hasStock ? 'הוסף לעגלה' : 'אזל מהמלאי'}
                            </button>`
                        }
                    </div>
                </div>
            `}).join('');
        }

        // עדכון כמות
        function updateQuantity(productId, newQuantity, maxStock) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            if (newQuantity <= 0) {
                cart = cart.filter(item => item.id !== productId);
                showToast('המוצר הוסר מהעגלה');
            } else if (newQuantity > maxStock) {
                showToast(`אין מספיק מלאי. נשארו ${maxStock} יחידות בלבד.`, 'error');
                return;
            } else {
                const item = cart.find(item => item.id === productId);
                if (item) {
                    item.quantity = newQuantity;
                }
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            
            // עדכון תצוגת הכפתור
            const product = allProducts.find(p => p.id === productId);
            if (product) {
                const btnContainer = document.getElementById(`cart-btn-${productId}`);
                const finalPrice = product.sale_price || product.price;
                const hasStock = product.stock_quantity > 0;
                
                if (newQuantity > 0) {
                    btnContainer.innerHTML = `
                        <div class="quantity-selector">
                            <button class="quantity-btn" onclick="updateQuantity(${productId}, ${newQuantity - 1}, ${product.stock_quantity})">-</button>
                            <div class="quantity-display">${newQuantity}</div>
                            <button class="quantity-btn" onclick="updateQuantity(${productId}, ${newQuantity + 1}, ${product.stock_quantity})">+</button>
                        </div>
                    `;
                } else {
                    btnContainer.innerHTML = `
                        <button 
                            class="add-to-cart-btn" 
                            onclick="addToCart(${productId}, '${product.name.replace(/'/g, "\\'")}', ${finalPrice}, ${product.stock_quantity})"
                            ${!hasStock ? 'disabled' : ''}
                        >
                            ${hasStock ? 'הוסף לעגלה' : 'אזל מהמלאי'}
                        </button>
                    `;
                }
            }
        }

        // הוספה לעגלה
        function addToCart(productId, productName, price, stockQuantity) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                if (existingItem.quantity >= stockQuantity) {
                    showToast(`אין מספיק מלאי. נשארו ${stockQuantity} יחידות בלבד.`, 'error');
                    return;
                }
                existingItem.quantity++;
            } else {
                cart.push({ 
                    id: productId, 
                    name: productName, 
                    price: price, 
                    quantity: 1,
                    maxStock: stockQuantity
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showToast('המוצר נוסף לעגלה!');
            
            // החלף את הכפתור לבורר כמות
            const btnContainer = document.getElementById(`cart-btn-${productId}`);
            const currentQuantity = cart.find(item => item.id === productId).quantity;
            btnContainer.innerHTML = `
                <div class="quantity-selector">
                    <button class="quantity-btn" onclick="updateQuantity(${productId}, ${currentQuantity - 1}, ${stockQuantity})">-</button>
                    <div class="quantity-display">${currentQuantity}</div>
                    <button class="quantity-btn" onclick="updateQuantity(${productId}, ${currentQuantity + 1}, ${stockQuantity})">+</button>
                </div>
            `;
        }

        // פתיחת Modal
        function openModal(product) {
            const modal = document.getElementById('productModal');
            const modalBody = document.getElementById('modalBody');
            
            const finalPrice = product.sale_price || product.price;
            const hasStock = product.stock_quantity > 0;
            
            modalBody.innerHTML = `
                ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}" class="modal-image">` : ''}
                
                <h2 class="modal-title">${product.name}</h2>
                
                ${product.description ? `<div class="modal-description">${product.description}</div>` : ''}
                
                <div class="modal-price-section">
                    ${product.price_label ? `<div class="modal-price-label">${product.price_label}</div>` : ''}
                    <div>
                        ${product.sale_price ? 
                            `<span class="modal-price">₪${product.sale_price}</span>
                             <span class="modal-original-price">₪${product.price}</span>` :
                            `<span class="modal-price">₪${product.price}</span>`
                        }
                    </div>
                </div>
                
                <div class="stock-status ${hasStock ? 'in-stock' : 'out-of-stock'}">
                    ${hasStock ? '🟢 במלאי' : '🔴 אזל מהמלאי'}
                </div>
                ${product.has_warranty ? '<span class="warranty-badge">🛡️ אחריות</span>' : ''}
                
                <div class="modal-actions">
                    <button 
                        class="modal-add-to-cart" 
                        onclick="addToCart(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${finalPrice}, ${product.stock_quantity}); closeModal();"
                        ${!hasStock ? 'disabled' : ''}
                    >
                        ${hasStock ? '🛒 הוסף לעגלה' : 'אזל מהמלאי'}
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // סגירת Modal
        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // סגירה בלחיצה על הרקע
        function closeModalOnBackdrop(event) {
            if (event.target.id === 'productModal') {
                closeModal();
            }
        }

        // סגירה עם ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // סינון לפי קטגוריה
        function filterByCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const filtered = category === '' ? 
                allProducts : 
                allProducts.filter(p => p.category === category);
            
            const container = document.getElementById('productsContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="error">בקרוב...</div>';
                return;
            }

            displayProducts(filtered);
        }

        // הצגת/הסתרת כפתור scroll
        const scrollTopBtn2 = document.querySelector('.scroll-top-btn');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                scrollTopBtn2.classList.add('visible');
            } else {
                scrollTopBtn2.classList.remove('visible');
            }
        });

        // לחיצה על הכפתור
        scrollTopBtn2.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // עדכון תג עגלה
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        // עדכון דינמי של כפתורים וfooter
        function updateFooterAndButtons() {
            const bottomNav = document.querySelector('.bottom-nav');
            const footer = document.querySelector('footer');
            const scrollBtn = document.querySelector('.scroll-top-btn');
            const cartBtn = document.querySelector('.cart-btn');
            
            if (window.innerWidth <= 768 && bottomNav) {
                const navHeight = bottomNav.offsetHeight;
                
                if (footer) footer.style.marginBottom = navHeight + 'px';
                
                let buttonBottom = navHeight + 20;
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    const footerDistanceFromBottom = viewportHeight - footerRect.top;
                    
                    if (footerDistanceFromBottom > 0 && footerDistanceFromBottom < viewportHeight) {
                        const footerHeight = footer.offsetHeight;
                        buttonBottom = navHeight + footerHeight + 20;
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            } else {
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30;
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    const documentHeight = document.documentElement.scrollHeight;
                    const scrollPosition = window.scrollY + viewportHeight;
                    const nearBottom = documentHeight - scrollPosition < 100;
                    
                    if (nearBottom && footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20;
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            }
        }

        // הזזת כפתור איזור אישי בגלילה - רק במובייל
        function updateAccountButtonPosition() {
            if (window.innerWidth <= 768) {
                const accountLink = document.querySelector('.account-link');
                if (accountLink) {
                    if (window.scrollY > 140) {
                        accountLink.style.top = '10px';
                    } else {
                        accountLink.style.top = '150px';
                    }
                }
            }
        }


        // טעינת קטגוריות מה-API
        async function loadCategories() {
            const filter = document.getElementById('categoryFilter');
            if (!filter) return;
            try {
                const res = await fetch(`${API_URL}/api/categories`);
                const cats = await res.json();
                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.textContent = cat.label;
                    btn.onclick = () => filterByCategory(cat.value);
                    filter.appendChild(btn);
                });
            } catch (err) {
                console.error('Failed to load categories:', err);
            }
        }

        // אתחול
        updateFooterAndButtons();
        window.addEventListener('resize', updateFooterAndButtons);
        window.addEventListener('scroll', updateFooterAndButtons);
        window.addEventListener('scroll', updateAccountButtonPosition);
        window.addEventListener('resize', updateAccountButtonPosition);
        updateAccountButtonPosition();
        loadProducts();
        loadCategories();
        updateCartBadge();
    </script>
    <script src="accessibility.js">
</script>
</body>
</html>
