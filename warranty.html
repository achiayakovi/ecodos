        // Scroll reveal animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-reveal').forEach(el => {
            observer.observe(el);
        });

        function showThankYou(event) {
            event.preventDefault(); // מונע ריענון העמוד

        // עדכון דינמי של margin-bottom של הפוטר לפי גובה התפריט
        function updateFooterAndButtons() {
            const bottomNav = document.querySelector('.bottom-nav');
            const footer = document.querySelector('footer');
            const scrollBtn = document.querySelector('.scroll-top-btn');
            const cartBtn = document.querySelector('.cart-btn');
            
            if (window.innerWidth <= 768 && bottomNav) {
                const navHeight = bottomNav.offsetHeight;
                
                // הפוטר תמיד מעל התפריט
                if (footer) footer.style.marginBottom = navHeight + 'px';
                
                // בדוק אם הפוטר קרוב לתחתית המסך
                let buttonBottom = navHeight + 20; // ברירת מחדל: רק מעל התפריט
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    const footerDistanceFromBottom = viewportHeight - footerRect.top;
                    
                    // אם הפוטר קרוב לתחתית (נמצא באזור התפריט)
                    if (footerDistanceFromBottom > 0 && footerDistanceFromBottom < viewportHeight) {
                        const footerHeight = footer.offsetHeight;
                        buttonBottom = navHeight + footerHeight + 20; // מעל הפוטר
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            } else {
                // מחשב - בדוק אם הפוטר נראה בתחתית
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30; // ברירת מחדל
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    // אם הפוטר נראה בתחתית המסך
                    if (footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20; // מעל הפוטר
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            }
        }

        // קריאה בטעינה, שינוי גודל, וגלילה
        updateFooterAndButtons();

    <script>
        const API_URL = 'https://ecodos-backend-production.up.railway.app';
        
        // Calendar state
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;

        const monthNames = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני',
                           'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

        // Initialize calendar dropdowns
        function initCalendar() {
            const monthSelect = document.getElementById('month-select');
            const yearSelect = document.getElementById('year-select');
            
            // Populate months
            monthNames.forEach((month, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = month;
                monthSelect.appendChild(option);
            });
            
            // Populate years (current year - 5 to current year + 2)
            const currentYearVal = new Date().getFullYear();
            for (let year = currentYearVal - 5; year <= currentYearVal + 2; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            }
            
            monthSelect.value = currentMonth;
            yearSelect.value = currentYear;
        }

        function toggleCalendar() {
            const popup = document.getElementById('calendar-popup');
            popup.classList.toggle('active');
            if (popup.classList.contains('active')) {
                renderCalendar();
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            document.getElementById('month-select').value = currentMonth;
            document.getElementById('year-select').value = currentYear;
            renderCalendar();
        }

        function updateCalendar() {
            currentMonth = parseInt(document.getElementById('month-select').value);
            currentYear = parseInt(document.getElementById('year-select').value);
            renderCalendar();
        }

        function renderCalendar() {
            const dates = document.getElementById('calendar-dates');
            
            // Clear previous dates
            dates.innerHTML = '';
            
            // Get first day of month and number of days
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const todayDate = today.getDate();
            const todayMonth = today.getMonth();
            const todayYear = today.getFullYear();
            
            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const dateDiv = document.createElement('div');
                dateDiv.className = 'calendar-date other-month';
                dateDiv.textContent = day;
                dates.appendChild(dateDiv);
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'calendar-date';
                dateDiv.textContent = day;
                
                // Mark today
                if (day === todayDate && currentMonth === todayMonth && currentYear === todayYear) {
                    dateDiv.classList.add('today');
                }
                
                // Mark selected date
                if (selectedDate && 
                    day === selectedDate.getDate() && 
                    currentMonth === selectedDate.getMonth() && 
                    currentYear === selectedDate.getFullYear()) {
                    dateDiv.classList.add('selected');
                }
                
                dateDiv.onclick = () => selectDate(day);
                dates.appendChild(dateDiv);
            }
            
            // Next month days to fill grid
            const totalCells = dates.children.length;
            const remainingCells = 42 - totalCells;
            for (let day = 1; day <= remainingCells; day++) {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'calendar-date other-month';
                dateDiv.textContent = day;
                dates.appendChild(dateDiv);
            }
        }

        function selectDate(day) {
            selectedDate = new Date(currentYear, currentMonth, day);
            
            // Format as DD/MM/YYYY
            const dd = String(day).padStart(2, '0');
            const mm = String(currentMonth + 1).padStart(2, '0');
            const yyyy = currentYear;
            
            document.getElementById('purchase-date').value = `${dd}/${mm}/${yyyy}`;
            
            // Close calendar
            document.getElementById('calendar-popup').classList.remove('active');
        }

        // Manual date input with auto-formatting
        document.getElementById('purchase-date').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2);
            }
            if (value.length >= 5) {
                value = value.substring(0, 5) + '/' + value.substring(5, 9);
            }
            
            e.target.value = value;
        });

        // Close calendar when clicking outside
        document.addEventListener('click', function(event) {
            const wrapper = document.getElementById('date-wrapper');
            const popup = document.getElementById('calendar-popup');
            
            if (!wrapper.contains(event.target) && popup.classList.contains('active')) {

                        buttonBottom = navHeight + footerHeight + 20;
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            } else {
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30;
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    if (footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20;
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtn.style.bottom = buttonBottom + 'px';
            }
        }

        updateFooterAndButtons();
        window.addEventListener('resize', updateFooterAndButtons);
        window.addEventListener('scroll', updateFooterAndButtons);

        function updateAccountButtonPosition() {
            if (window.innerWidth <= 768) {
                const accountLink = document.querySelector('.account-link');
                if (accountLink) {
                    if (window.scrollY > 140) {
                        accountLink.style.top = '10px';
                    } else {
                        accountLink.style.top = '150px';
                    }
                }
            }
        }

        window.addEventListener('scroll', updateAccountButtonPosition);
        window.addEventListener('resize', updateAccountButtonPosition);
        updateAccountButtonPosition();

        // Initialize calendar on load
        initCalendar();
    </script>
    <script src="accessibility.js"></script>
</body>
</html>
