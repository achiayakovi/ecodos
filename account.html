    <script>
        // Scroll reveal animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-reveal').forEach(el => {
            observer.observe(el);
        });

        // Show thank you message on form submit
        function showThankYou(event) {
            event.preventDefault(); // מונע ריענון העמוד
            
            // שליחת הטופס ב-AJAX
            const form = event.target;
            const formData = new FormData(form);
            
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(() => {
                // הצגת הודעת תודה
                document.getElementById('success-message').style.display = 'block';
                document.querySelector('.contact-form').style.display = 'none';
                document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
            }).catch(() => {
                // גם אם יש שגיאה, נציג הודעה
                document.getElementById('success-message').style.display = 'block';
                document.querySelector('.contact-form').style.display = 'none';
                document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
            });
            
            return false;
        }

        // Toggle mobile menu
        function toggleMenu() {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        }

        // Close menu when clicking on a link
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navMenu').classList.remove('active');
            });
        });

        // עדכון active כשלוחצים על קישורים פנימיים (#contact)
        document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                
                // אם זה קישור פנימי (מתחיל ב-#)
                if (href && href.startsWith('#')) {
                    // הסר active מכל הקישורים בשני התפריטים
                    document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(l => {
                        l.classList.remove('active');
                    });
                    
                    // הוסף active לקישורים עם אותו href בשני התפריטים
                    document.querySelectorAll(`.nav-menu a[href="${href}"], .bottom-nav a[href="${href}"]`).forEach(l => {
                        l.classList.add('active');
                    });
                }
            });
        });

        // פונקציה עזר לעדכון active
        function setActive(href) {
            document.querySelectorAll('.nav-menu a, .bottom-nav a').forEach(l => {
                l.classList.remove('active');
            });
            document.querySelectorAll(`.nav-menu a[href="${href}"], .bottom-nav a[href="${href}"]`).forEach(l => {
                l.classList.add('active');
            });
        }

        // Scroll Spy - עמוד איזור אישי
        // (אין scroll spy בדף זה)

        // כפתור חזרה למעלה
        const scrollTopBtn = document.createElement('button');
        scrollTopBtn.innerHTML = '↑';
        scrollTopBtn.className = 'scroll-top-btn';
        scrollTopBtn.setAttribute('aria-label', 'חזרה למעלה');
        document.body.appendChild(scrollTopBtn);

        // הצגת/הסתרת הכפתור
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                scrollTopBtnAcc.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        // לחיצה על הכפתור
        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActive('account.html');
        });

        // כפתור עגלת קניות
        const cartBtn = document.createElement('button');
        cartBtn.innerHTML = '🛒<span class="badge" id="cartBadge">0</span>';
        cartBtn.className = 'cart-btn';
        cartBtn.setAttribute('aria-label', 'עגלת קניות');
        cartBtn.onclick = function() { window.location.href = 'cart.html'; };
        document.body.appendChild(cartBtn);

        // עדכון תג עגלה
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }
        updateCartBadge();

        // עדכון דינמי של margin-bottom של הפוטר לפי גובה התפריט
        function updateFooterAndButtons() {
            const bottomNav = document.querySelector('.bottom-nav');
            const footer = document.querySelector('footer');
            const scrollBtn = document.querySelector('.scroll-top-btn');
            const cartBtnAcc = document.querySelector('.cart-btn');
            
            if (window.innerWidth <= 768 && bottomNav) {
                const navHeight = bottomNav.offsetHeight;
                
                // הפוטר תמיד מעל התפריט
                if (footer) footer.style.marginBottom = navHeight + 'px';
                
                // בדוק אם הפוטר קרוב לתחתית המסך
                let buttonBottom = navHeight + 20; // ברירת מחדל: רק מעל התפריט
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    const footerDistanceFromBottom = viewportHeight - footerRect.top;
                    
                    // אם הפוטר קרוב לתחתית (נמצא באזור התפריט)
                    if (footerDistanceFromBottom > 0 && footerDistanceFromBottom < viewportHeight) {
                        const footerHeight = footer.offsetHeight;
                        buttonBottom = navHeight + footerHeight + 20; // מעל הפוטר
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtnAcc.style.bottom = buttonBottom + 'px';
            } else {
                // מחשב - בדוק אם הפוטר נראה בתחתית
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30; // ברירת מחדל
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    // אם הפוטר נראה בתחתית המסך
                    if (footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20; // מעל הפוטר
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtnAcc.style.bottom = buttonBottom + 'px';
            }
        }

        // קריאה בטעינה, שינוי גודל, וגלילה
        updateFooterAndButtons();
        window.addEventListener('resize', updateFooterAndButtons);
        window.addEventListener('scroll', updateFooterAndButtons);

        // הזזת כפתור איזור אישי בגלילה - רק במובייל
        function updateAccountButtonPosition() {
            if (window.innerWidth <= 768) {
                const accountLink = document.querySelector('.account-link');
                if (accountLink) {
                    if (window.scrollY > 140) {
                        accountLink.style.top = '10px';
                    } else {
                        accountLink.style.top = '150px';
                    }
                               }
            }
        }

        window.addEventListener('scroll', updateAccountButtonPosition);
        window.addEventListener('resize', updateAccountButtonPosition);
        updateAccountButtonPosition();
    </script>
    <script>

        const API_URL = 'https://ecodos-backend-production.up.railway.app';

        // Toast Notification Function
        function showToast(message, type = 'info', duration = 3000) {
            const icons = {
                success: '✓',
                error: '✗',
                info: 'ℹ'
            };

            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${icons[type]}</div>
                <div class="toast-message">${message}</div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, duration);
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadDashboard();
            } else {
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('dashboardContainer').style.display = 'none';
            }
        }

        function toggleForm(form) {
            if (form === 'register') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            } else {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            }
        }

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: 'התחברות נכשלה' }));
                    throw new Error(errorData.message || 'התחברות נכשלה');
                }

                const data = await response.json();
                localStorage.setItem('token', data.token);
                showToast('התחברת בהצלחה!', 'success');
                setTimeout(() => checkAuth(), 1000);
            } catch (error) {
                console.error('Login error:', error);
                showToast('שגיאה בהתחברות: ' + (error.message || 'בדוק את הפרטים ונסה שוב'), 'error');
            }
        }

        async function register(e) {
            e.preventDefault();
            const formData = {
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                full_name: document.getElementById('regFullName').value,
                phone: document.getElementById('regPhone').value,
                address: document.getElementById('regAddress').value
            };

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: 'הרשמה נכשלה' }));
                    throw new Error(errorData.message || 'הרשמה נכשלה');
                }

                const data = await response.json();
                localStorage.setItem('token', data.token);
                showToast('נרשמת בהצלחה!', 'success');
                setTimeout(() => checkAuth(), 1000);
            } catch (error) {
                console.error('Register error:', error);
                showToast('שגיאה בהרשמה: ' + (error.message || 'נסה שוב'), 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            showToast('התנתקת בהצלחה', 'info');
            setTimeout(() => checkAuth(), 1000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        async function loadDashboard() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('שגיאה בטעינת פרופיל');

                const user = await response.json();
                document.getElementById('userName').textContent = user.full_name;
                document.getElementById('profileFullName').value = user.full_name;
                document.getElementById('profilePhone').value = user.phone || '';
                document.getElementById('profileAddress').value = user.address || '';

                loadOrders();
                loadWarranties();
            } catch (error) {
                console.error('Error:', error);
                showToast('שגיאה בטעינת הפרופיל', 'error');
                logout();
            }
        }

        async function loadOrders() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/user/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const orders = await response.json();
                const container = document.getElementById('ordersList');

                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>אין הזמנות</h3><p>התחל לקנות עכשיו!</p></div>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">הזמנה #${order.id}</span>
                            <span class="order-status status-${order.status}">${order.status === 'pending' ? 'ממתין' : 'מאושר'}</span>
                        </div>
                        <div><strong>תאריך:</strong> ${new Date(order.created_at).toLocaleDateString('he-IL')}</div>
                        <div><strong>סה"כ:</strong> ₪${order.total_amount}</div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">${item.product_name} x${item.quantity}</div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadWarranties() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/user/warranties`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const warranties = await response.json();
                const container = document.getElementById('warrantiesList');

                if (warranties.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>אין אחריות רשומה</h3></div>';
                    return;
                }

                container.innerHTML = warranties.map(w => `
                    <div class="warranty-card">
                        <h3>מספר מכשיר: ${w.machine_number}</h3>
                        <div class="warranty-info">
                            <div class="warranty-field">
                                <strong>תאריך רכישה:</strong>
                                ${new Date(w.purchase_date).toLocaleDateString('he-IL')}
                            </div>
                            <div class="warranty-field">
                                <strong>תוקף עד:</strong>
                                ${new Date(w.expiry_date).toLocaleDateString('he-IL')}
                            </div>
                            <div class="warranty-field">
                                <strong>סטטוס:</strong>
                                <span style="color: ${w.status === 'בתוקף' ? '#27ae60' : w.status === 'ממתין לאישור' ? '#f39c12' : '#e74c3c'};">
                                    ${w.status}
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function updateProfile(e) {
            e.preventDefault();
            const token = localStorage.getItem('token');

            const formData = {
                full_name: document.getElementById('profileFullName').value,
                phone: document.getElementById('profilePhone').value,
                address: document.getElementById('profileAddress').value
            };

            try {
                const response = await fetch(`${API_URL}/api/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('שגיאה בעדכון');

                showToast('הפרטים עודכנו בהצלחה!', 'success');
                loadDashboard();
            } catch (error) {
                showToast('שגיאה בעדכון פרטים', 'error');
            }
        }

        // הצגת/הסתרת כפתור scroll
        const scrollTopBtnAcc = document.querySelector('.scroll-top-btn');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // עדכון תג עגלה
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        // עדכון דינמי של margin-bottom של הפוטר לפי גובה התפריט
        function updateFooterAndButtons() {
            const bottomNav = document.querySelector('.bottom-nav');
            const footer = document.querySelector('footer');
            const scrollBtn = document.querySelector('.scroll-top-btn');
            const cartBtnAcc = document.querySelector('.cart-btn');
            
            if (window.innerWidth <= 768 && bottomNav) {
                const navHeight = bottomNav.offsetHeight;
                
                if (footer) footer.style.marginBottom = navHeight + 'px';
                
                let buttonBottom = navHeight + 20;
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    const footerDistanceFromBottom = viewportHeight - footerRect.top;
                    
                    if (footerDistanceFromBottom > 0 && footerDistanceFromBottom < viewportHeight) {
                        const footerHeight = footer.offsetHeight;
                        buttonBottom = navHeight + footerHeight + 20;
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) cartBtnAcc.style.bottom = buttonBottom + 'px';
            } else {
                if (footer) footer.style.marginBottom = '0';
                
                let buttonBottom = 30;
                
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    const viewportHeight = window.innerHeight;
                    
                    const documentHeight = document.documentElement.scrollHeight;
                    const scrollPosition = window.scrollY + viewportHeight;
                    const nearBottom = documentHeight - scrollPosition < 100;
                    
                    if (nearBottom && footerRect.top < viewportHeight) {
                        const footerVisible = viewportHeight - footerRect.top;
                        if (footerVisible > 0) {
                            buttonBottom = footerVisible + 20;
                        }
                    }
                }
                
                if (scrollBtn) scrollBtn.style.bottom = buttonBottom + 'px';
                if (cartBtn) scrollBtn.style.bottom = buttonBottom + 'px';
            }
        }

        // הזזת כפתור איזור אישי בגלילה - רק במובייל
        function updateAccountButtonPosition() {
            if (window.innerWidth <= 768) {
                const accountLink = document.querySelector('.account-link');
                if (accountLink) {
                    if (window.scrollY > 140) {
                        accountLink.style.top = '10px';
                    } else {
                        accountLink.style.top = '150px';
                    }
                }
            }
        }

        // Change Password Modal Functions
        function openChangePasswordModal() {
            document.getElementById('changePasswordModal').style.display = 'flex';
            document.getElementById('changePasswordForm').reset();
            document.getElementById('passwordMessage').style.display = 'none';
        }

        function closeChangePasswordModal() {
            document.getElementById('changePasswordModal').style.display = 'none';
            document.getElementById('changePasswordForm').reset();
            document.getElementById('passwordMessage').style.display = 'none';
        }

        async function changePassword(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showToast('הסיסמאות אינן תואמות', 'error');
                return;
            }

            if (currentPassword === newPassword) {
                showToast('הסיסמה החדשה חייבת להיות שונה מהסיסמה הנוכחית', 'error');
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/api/user/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('הסיסמה שונתה בהצלחה!', 'success');
                    setTimeout(() => closeChangePasswordModal(), 1500);
                } else {
                    showToast(data.error || 'שגיאה בשינוי הסיסמה', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('שגיאה בשינוי הסיסמה. נסה שוב.', 'error');
            }
        }

        // קריאה בטעינה, שינוי גודל, וגלילה
        updateFooterAndButtons();
        window.addEventListener('resize', updateFooterAndButtons);
        window.addEventListener('scroll', updateFooterAndButtons);
        window.addEventListener('scroll', updateAccountButtonPosition);
        window.addEventListener('resize', updateAccountButtonPosition);
        updateAccountButtonPosition();

        checkAuth();
        updateCartBadge();
    
</script>
