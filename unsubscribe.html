<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הסרה מקבלת עדכונים — ECODOS</title>
    <meta name="robots" content="noindex,nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Rubik', Arial, sans-serif;
            background: #E8EFFF;
            color: #1A2332;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }
        .card {
            background: #CFD7F0;
            border: 1px solid #95A3D9;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .logo {
            color: #1A2332;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        h1 {
            color: #1A2332;
            font-size: 1.6rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        h2 {
            color: #1A2332;
            font-size: 1.4rem;
            margin: 12px 0;
            font-weight: 600;
        }
        p {
            color: #5A6C7D;
            margin-bottom: 25px;
            font-size: 1rem;
        }
        label.field-label {
            display: block;
            text-align: right;
            color: #1A2332;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="tel"] {
            width: 100%;
            padding: 14px 18px;
            background: #E8EFFF;
            border: 1px solid #95A3D9;
            color: #1A2332;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            text-align: right;
            direction: ltr;
        }
        input[type="tel"]:focus {
            outline: none;
            border-color: #1E6FD9;
        }
        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: right;
            margin: 12px 0;
            padding: 15px;
            background: #E8EFFF;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .checkbox-row:hover {
            background: #11131A;
        }
        .checkbox-row input[type="checkbox"] {
            margin-top: 4px;
            flex-shrink: 0;
            accent-color: #1E6FD9;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-row span {
            color: #1A2332;
            font-size: 0.95rem;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #1E6FD9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        button:hover:not(:disabled) {
            background: #1860C2;
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff8088;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .success-icon {
            color: #1E6FD9;
            font-size: 3.5rem;
            margin-bottom: 12px;
        }
        .link {
            display: inline-block;
            margin-top: 30px;
            color: #1E6FD9;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover { text-decoration: underline; }
        .small {
            color: #5A6C7D;
            font-size: 0.85rem;
            margin-top: 20px;
            margin-bottom: 0;
        }
        .loading {
            color: #5A6C7D;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">ECODOS</div>

        <!-- Loading / invalid token state -->
        <div id="initialState">
            <h1 id="initialTitle">טוען...</h1>
            <p id="initialMessage" class="loading">בודק את הקישור</p>
            <div id="initialLink" style="display:none;">
                <a href="https://ecodos.co.il" class="link">לחזור לאתר ECODOS</a>
            </div>
        </div>

        <!-- Form state -->
        <div id="formState" style="display:none;">
            <h1>הסרה מקבלת עדכונים</h1>
            <p>לאישור ההסרה, אנא הכנס את מספר הטלפון שרשמת ובחר ממה להסיר.</p>

            <form id="unsubForm" onsubmit="submitUnsubscribe(event)">
                <label class="field-label" for="phoneInput">מספר הטלפון שרשמת:</label>
                <input type="tel" id="phoneInput" required pattern="[0-9\-+\s]{9,}" placeholder="050-1234567" autocomplete="tel">

                <label class="checkbox-row">
                    <input type="checkbox" id="removeEmail" checked>
                    <span>הסר את כתובת המייל מקבלת מיילים מאקודוס</span>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" id="removePhone">
                    <span>הסר את מספר הטלפון מקבלת שיחות מאקודוס</span>
                </label>

                <button type="submit" id="submitBtn">אישור הסרה</button>

                <div id="errorMsg" class="error-msg" style="display:none;"></div>
            </form>

            <p class="small">פעולה זו תפעל גם על רישומים אחרים עם אותו מייל / טלפון בהתאמה.</p>
        </div>

        <!-- Success state -->
        <div id="successState" style="display:none;">
            <div class="success-icon">✓</div>
            <h2>הוסרת בהצלחה</h2>
            <p id="successMessage"></p>
            <a href="https://ecodos.co.il" class="link">לחזור לאתר ECODOS</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://ecodos-backend-production.up.railway.app';

        // Read token from URL on page load
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        function showInvalidLink(message) {
            document.getElementById('initialTitle').textContent = 'קישור לא תקין';
            const msg = document.getElementById('initialMessage');
            msg.textContent = message;
            msg.classList.remove('loading');
            document.getElementById('initialLink').style.display = 'block';
        }

        if (!token) {
            showInvalidLink('הקישור אינו כולל טוקן הסרה.');
        } else if (typeof token !== 'string' || token.length !== 64 || !/^[a-f0-9]+$/.test(token)) {
            showInvalidLink('הקישור אינו במבנה הצפוי.');
        } else {
            // Valid token format — show form
            document.getElementById('initialState').style.display = 'none';
            document.getElementById('formState').style.display = 'block';
        }

        async function submitUnsubscribe(event) {
            event.preventDefault();

            const phone = document.getElementById('phoneInput').value.trim();
            const remove_email = document.getElementById('removeEmail').checked;
            const remove_phone = document.getElementById('removePhone').checked;

            if (!remove_email && !remove_phone) {
                showError('אנא בחר לפחות אחת מהאפשרויות');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'שולח...';
            hideError();

            try {
                const response = await fetch(`${API_URL}/api/waitlist/unsubscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, phone, remove_email, remove_phone })
                });
                const result = await response.json().catch(() => ({}));

                if (response.ok && result.success) {
                    document.getElementById('formState').style.display = 'none';
                    document.getElementById('successMessage').textContent = result.message || 'הוסרת בהצלחה.';
                    document.getElementById('successState').style.display = 'block';
                } else {
                    showError(result.error || 'שגיאה בהסרה, נסו שוב');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (e) {
                showError('שגיאה בחיבור לשרת. בדקו חיבור לאינטרנט ונסו שוב.');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
